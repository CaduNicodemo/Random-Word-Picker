<!DOCTYPE html>
<html lang="en"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Word Picker - Red Balloon Cambridge Week</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-logos">
            <img class="logo-rb" src="./Logo-Header.png" alt="Red Balloon Logo">
            <img class="logo-cambridge" src="./CEQ_logo.svg" alt="Cambridge English Exam Logo">
        </div>
        <div class="levelSelect"><button class="btn-levelJ1-J2" onclick="loadWordList('J1-J2')">J1-J2</button><button class="btn-levelTA-T2" onclick="loadWordList('TA-T2')">TA-T2
        </button><button class="btn-levelT3-T6" onclick="loadWordList('T3-T6')">T3-T6</button></div>
    </header>

    <div class="main-container">
        <div class="picker-section">
            <p class="instruction">Paste your comma-separated words below:</p>
            <textarea id="wordInput" placeholder="apple, banana, cherry, dragonfruit..."></textarea>
            
            <div class="controls">
                <button class="btn-pick" onclick="pickWord()">Pick a Word</button>
                <button class="btn-reset" onclick="resetPool()">Reset List</button>
            </div>

            <div id="result-container">
                <div id="result">...</div>
                <div id="counter">Words remaining in pool: 0</div>
            </div>
        </div>

        <div class="history-section">
            <h3>Picked List</h3>
            <ul id="pickedList"></ul>
        </div>
    </div>

    <script>
        let wordPool = [];
        let pickedWords = [];

        // Word lists for each level
        const wordLists = {
            'J1-J2': 'Big Ben, Cambridge, England, football, guards, Hogwarts, island, king, London, marmalade, queen, rain, Shakespeare, tea, underground, Victoria, Wales, Yorkshire',
            'TA-T2': 'Big Ben, Cambridge, crown, England, football, fish and chips, guards, Hogwarts, island, king, London, marmalade, queen, rain, royal, rugby, Shakespeare, tea, underground, Victoria, Wales, Yorkshire',
            'T3-T6': 'flat, lift, lorry, biscuit, chips, crisps, holidays, queue, torch, rubber, football, trousers, petrol, chemist, postman, tube, zebra crossing, timetable, garden, dummy, nappy, tap, jumper'
        };

        function loadWordList(level) {
            const wordInput = document.getElementById('wordInput');
            wordInput.value = wordLists[level];
            wordPool = [];
            pickedWords = [];
            document.getElementById('result').innerText = '...';
            updateUI();
        }

        function initializePool() {
            const rawText = document.getElementById('wordInput').value;
            if (!rawText.trim()) {
                wordPool = [];
                updateUI();
                return false;
            }
            
            wordPool = rawText.split(',')
                             .map(word => word.trim())
                             .filter(word => word.length > 0);
            
            pickedWords = []; 
            updateUI();
            return true;
        }

        function pickWord() {
            const resultDiv = document.getElementById('result');
            
            if (wordPool.length === 0) {
                if (pickedWords.length > 0) {
                     resultDiv.innerHTML = "<span style='color: var(--rb-text-sub); font-size: 18px;'>All words picked! Press Reset to reload.</span>";
                     return;
                }

                const loaded = initializePool();
                if (!loaded || wordPool.length === 0) {
                    resultDiv.innerHTML = "<span style='color: var(--rb-red); font-size: 18px;'>Please enter some words first!</span>";
                    return;
                }
            }

            const randomIndex = Math.floor(Math.random() * wordPool.length);
            const selectedWord = wordPool.splice(randomIndex, 1)[0];
            
            pickedWords.push(selectedWord);
            resultDiv.innerText = selectedWord;
            updateUI();
        }

        function resetPool() {
            if(initializePool()){
                document.getElementById('result').innerText = "...";
                const resetBtn = document.querySelector('.btn-reset');
                resetBtn.innerText = "Reloaded!";
                setTimeout(() => resetBtn.innerText = "Reset List", 1000);
            }
        }

        function updateUI() {
            document.getElementById('counter').innerText = `Words remaining in pool: ${wordPool.length}`;
            
            const listElement = document.getElementById('pickedList');
            listElement.innerHTML = ''; 

            for (let i = pickedWords.length - 1; i >= 0; i--) {
                const li = document.createElement('li');
                li.innerText = pickedWords[i];
                listElement.appendChild(li);
            }
        }

        window.onload = initializePool;
    </script>


</body></html>
