        // ===== AJUDA PARA IDENTIFICAR ELEMENTOS ATUAIS =====
function getActiveElements() {
    // Se estivermos na página de prática, usa os IDs com o prefixo 'practice'
    if (currentPage === 'practice') {
        return {
            input: document.getElementById('practiceWordInput'),
            result: document.getElementById('practiceResult'),
            counter: document.getElementById('practiceCounter'),
            list: document.getElementById('practicePickedList')
        };
    } 
    // Caso contrário, usa os IDs da Home
    return {
        input: document.getElementById('wordInput'),
        result: document.getElementById('result'),
        counter: document.getElementById('counter'),
        list: document.getElementById('pickedList')
    };
}

// ===== WORD PICKER LOGIC =====
function initializePool() {
    const els = getActiveElements();
    const rawText = els.input.value;
    
    if (!rawText.trim()) {
        wordPool = [];
        updateUI();
        return false;
    }
    
    wordPool = rawText.split(',').map(word => word.trim()).filter(word => word.length > 0);
    pickedWords = []; 
    updateUI();
    return true;
}

function pickWord() {
    const els = getActiveElements();
    
    if (wordPool.length === 0) {
        if (pickedWords.length > 0) {
             els.result.innerHTML = "<span style='color: var(--rb-text-sub); font-size: 18px;'>All words picked! Press Reset to reload.</span>";
             return;
        }
        const loaded = initializePool();
        if (!loaded) return;
    }
 
    const randomIndex = Math.floor(Math.random() * wordPool.length);
    const selectedWord = wordPool.splice(randomIndex, 1)[0];
    
    pickedWords.push(selectedWord);
    els.result.innerText = selectedWord;
    updateUI();
}

function resetPool() {
    if(initializePool()){
        const els = getActiveElements();
        els.result.innerText = "...";
    }
}

function updateUI() {
    const els = getActiveElements();
    els.counter.innerText = `Words remaining in pool: ${wordPool.length}`;
    
    els.list.innerHTML = ''; 
    for (let i = pickedWords.length - 1; i >= 0; i--) {
        const li = document.createElement('li');
        li.innerText = pickedWords[i];
        els.list.appendChild(li);
    }
}

// ===== NAVEGAÇÃO (Mantendo o que já funcionava) =====
function showPage(pageName) {
    currentPage = pageName; // Atualiza a variável global de controle
    document.getElementById('home-page').style.display = (pageName === 'home') ? 'block' : 'none';
    document.getElementById('menu-page').style.display = (pageName === 'menu') ? 'block' : 'none';
    document.getElementById('practice-type-page').style.display = (pageName === 'practice-type') ? 'block' : 'none';
    document.getElementById('practice-page').style.display = (pageName === 'practice') ? 'block' : 'none';
}

        function goHome() {
            showPage('home');
        }

        function goToMenu(menuId) {
            currentMenu = menuId;
            const menuData = wordDatabase[menuId];
            document.getElementById('menu-title').textContent = `${menuData.name} - Select a Level`;

            // Generate level buttons
            const container = document.getElementById('level-buttons-container');
            container.innerHTML = '';

            for (const level in menuData.levels) {
                const btn = document.createElement('button');
                btn.className = 'level-btn';
                btn.textContent = level;
                btn.onclick = () => (menuId === 'cambridge-week') ? goToPractice(menuId, level, null) : goToPracticeType(menuId, level);
                container.appendChild(btn);
        }
        showPage('menu');
    }
    function goToPracticeType(menuId, level) {
        currentLevel = level;
        const container = document.getElementById('practice-type-container');
        container.innerHTML = '';
        ['Practice 1', 'Practice 2', 'Championship'].forEach(type => {
        const btn = document.createElement('button');
            btn.className = 'level-btn';
            btn.textContent = type;
            btn.onclick = () => goToPractice(menuId, level, type);
            container.appendChild(btn);
        });
        showPage('practice-type');
    }
        function goToPractice(menuId, level, type) {
        currentMenu = menuId;
        const words = type ? wordDatabase[menuId].levels[level][type] : wordDatabase[menuId].levels[level];
        
        showPage('practice');
        // Agora usamos getActiveElements para garantir que vamos escrever no textarea correto
        const els = getActiveElements();
        els.input.value = words;
        wordPool = [];
        pickedWords = [];
        els.result.innerText = '...';
        updateUI();
    }
function goBackFromPractice() {
        (currentMenu === 'cambridge-week') ? goToMenu(currentMenu) : goToPracticeType(currentMenu, currentLevel);
